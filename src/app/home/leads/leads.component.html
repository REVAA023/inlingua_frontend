<div class="main-container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <p class="fw-bold fs-5 m-0 p-0">Leads</p>
    <div class="d-flex gap-2">
      <button class="btn btn-secondary btn-sm">Add Leads</button>
      <div class="dropdown">
        <button
          class="btn btn-secondary btn-sm dropdown-toggle"
          type="button"
          id="dropdownMenuButton"
          data-bs-toggle="dropdown"
          aria-haspopup="true"
          aria-expanded="false"
        >
          Actions
        </button>
        <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">
          <a class="dropdown-item" href="#">Import Leads</a>
          <a class="dropdown-item" href="#">Export Leads</a>
          <a class="dropdown-item" href="#">Edit Table</a>
        </div>
      </div>
      <i class='bx bx-filter-alt border p-2 rounded' ></i>
    </div>
  </div>

  @if (false) {
  <table class="table table-bordered">
    <thead>
      <tr>
        <th scope="col">#</th>
        <th scope="col">First</th>
        <th scope="col">Last</th>
        <th scope="col">Handle</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <th scope="row">1</th>
        <td>Mark</td>
        <td>Otto</td>
        <td>mdo</td>
      </tr>
      <tr>
        <th scope="row">2</th>
        <td>Jacob</td>
        <td>Thornton</td>
        <td>fat</td>
      </tr>
      <tr>
        <th scope="row">3</th>
        <td>Larry the Bird</td>
        <td>Larry the Bird</td>
        <td>twitter</td>
      </tr>
    </tbody>
  </table>

  <nav aria-label="Page navigation example">
    <ul class="pagination justify-content-end pagination-sm">
      <li class="page-item disabled">
        <a class="page-link" href="#" tabindex="-1" aria-disabled="true"
          >Previous</a
        >
      </li>
      <li class="page-item active"><a class="page-link" href="#">1</a></li>
      <li class="page-item"><a class="page-link" href="#">2</a></li>
      <li class="page-item"><a class="page-link" href="#">3</a></li>
      <li class="page-item"><a class="page-link" href="#">...</a></li>
      <li class="page-item"><a class="page-link" href="#">10</a></li>
      <li class="page-item">
        <a class="page-link" href="#">Next</a>
      </li>
    </ul>
  </nav>
  } @else {
  <div class="d-flex flex-column justify-content-center align-items-center">
    <img src="leads.png" alt="No Leads" width="400" />
    <p class="text-center fs-5 fw-bold">No leads found</p>
    <p class="text-center">
      You can add or import leads by clicking the button above
    </p>
  </div>
  }
</div>
